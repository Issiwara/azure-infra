# .github/workflows/terraform-plan.yml
# Runs on every PR that touches .tf files
# Only does: init → validate → plan
# Posts the plan output as a PR comment
# Does NOT apply anything

name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -input=false \
            2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const MAX  = 65000;
            const body = plan.length > MAX
              ? plan.substring(0, MAX) + '\n\n> ⚠ Output truncated'
              : plan;

            const initOutcome     = '${{ steps.init.outcome }}';
            const validateOutcome = '${{ steps.validate.outcome }}';
            const planOutcome     = '${{ steps.plan.outcome }}';

            const icon = planOutcome === 'success' ? '✅' : '❌';

            const comment = `## ${icon} Terraform Plan

            | Step | Result |
            |------|--------|
            | 🔧 Init     | ${initOutcome === 'success' ? '✅ passed' : '❌ failed'} |
            | ✔ Validate | ${validateOutcome === 'success' ? '✅ passed' : '❌ failed'} |
            | 📋 Plan    | ${planOutcome === 'success' ? '✅ success' : '❌ failed'} |

            <details>
            <summary>📄 Show full plan output</summary>

            \`\`\`terraform
            ${body}
            \`\`\`

            </details>

            > 🔒 Merge this PR to trigger \`terraform apply\` on the \`main\` branch.
            > 🗄 State is stored in Azure Blob Storage with automatic locking.

            *Generated by Azure Architect v1.0 · ${{ github.sha }}*`;

            // Delete old plan comments to keep PR clean
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.login === 'github-actions[bot]' &&
                  c.body.includes('Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body:         comment,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1